<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 760" role="img" aria-labelledby="title desc">
  <title id="title">Corrected Dragon Budget app preview</title>
  <desc id="desc">Three dark Dragon Budget app preview screens with one top menu and positive money displays.</desc>
  <defs>
    <linearGradient id="screen" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="1" stop-color="#0d1b2e"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#132a45"/>
      <stop offset="1" stop-color="#07111f"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#46d9ff"/>
      <stop offset="1" stop-color="#2f8cff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#020712" flood-opacity="0.42"/>
    </filter>
  </defs>
  <rect width="1500" height="760" fill="#06101d"/>
  <text x="92" y="76" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="38" font-weight="800">Dragon Budget app direction</text>
  <text x="92" y="116" fill="#bdd0e5" font-family="Arial, Helvetica, sans-serif" font-size="24">Corrected preview: one top menu, positive outflow labels, mature blue dragon icon.</text>

  <g transform="translate(70 150)" filter="url(#shadow)">
    <rect width="398" height="560" rx="34" fill="url(#screen)" stroke="#8ca6c7" stroke-width="2"/>
    <text x="32" y="52" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Dashboard</text>
    <g transform="translate(246 24) scale(.16)">
      <rect width="512" height="512" rx="112" fill="#12315c"/>
      <path d="M124 264c19-92 90-154 188-157 54-2 101 16 135 50-47 3-84 17-114 43 58 11 101 41 130 91-62-17-114-9-158 24 33 9 60 24 82 46-57 13-112 4-165-27-8 35-28 69-60 102-1-54-14-99-38-172Z" fill="url(#blue)" stroke="#8edfff" stroke-width="18" stroke-linejoin="round"/>
      <path d="M232 233c25-16 54-23 88-21-19 13-32 30-40 50 26-10 52-11 79-4-36 11-64 27-85 48-28-16-42-40-42-73Z" fill="#d6f7ff"/>
      <path d="M283 258c21-1 39 4 55 15-20 2-36 7-50 15l-5-30Z" fill="#06101d"/>
    </g>
    <rect x="28" y="84" width="342" height="150" rx="20" fill="url(#card)" stroke="#24405e"/>
    <text x="52" y="126" fill="#dbe9f8" font-family="Arial, Helvetica, sans-serif" font-size="20">Safe to spend</text>
    <text x="52" y="184" fill="#37d67a" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="800">$237.45</text>
    <rect x="52" y="204" width="190" height="12" rx="6" fill="#24405e"/>
    <rect x="52" y="204" width="94" height="12" rx="6" fill="#37d67a"/>
    <rect x="28" y="256" width="158" height="92" rx="16" fill="url(#card)" stroke="#24405e"/>
    <text x="48" y="294" fill="#bdd0e5" font-family="Arial, Helvetica, sans-serif" font-size="17">Current</text>
    <text x="48" y="326" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">$1,987.41</text>
    <rect x="212" y="256" width="158" height="92" rx="16" fill="url(#card)" stroke="#24405e"/>
    <text x="232" y="294" fill="#bdd0e5" font-family="Arial, Helvetica, sans-serif" font-size="17">Next payday</text>
    <text x="232" y="326" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">May 23</text>
    <rect x="28" y="372" width="342" height="120" rx="18" fill="url(#card)" stroke="#24405e"/>
    <text x="52" y="414" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800">Weekend Trip</text>
    <text x="52" y="452" fill="#bdd0e5" font-family="Arial, Helvetica, sans-serif" font-size="18">Remaining budget</text>
    <text x="250" y="452" fill="#37d67a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">$320.00</text>
  </g>

