<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Dragon Budget social preview</title>
  <desc id="desc">A mature blue dragon beside a Dragon Budget safe-to-spend preview card.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#12315c"/>
      <stop offset="1" stop-color="#0f8b8d"/>
    </linearGradient>
    <linearGradient id="scale" x1="670" x2="1090" y1="85" y2="540" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#46d9ff"/>
      <stop offset="0.34" stop-color="#2f8cff"/>
      <stop offset="1" stop-color="#12315c"/>
    </linearGradient>
    <linearGradient id="horn" x1="805" x2="1015" y1="52" y2="230" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#f5f8ff"/>
      <stop offset="1" stop-color="#8ca6c7"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="26" flood-color="#020712" flood-opacity="0.34"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect x="56" y="58" width="1088" height="514" rx="28" fill="#f6faff" filter="url(#softShadow)"/>
  <rect x="88" y="90" width="1024" height="450" rx="22" fill="#ffffff" stroke="#d8e4f0" stroke-width="2"/>

  <text x="128" y="172" fill="#12315c" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800">Dragon Budget</text>
  <text x="128" y="248" fill="#12315c" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800">Know what is safe</text>
  <text x="128" y="312" fill="#12315c" font-family="Arial, Helvetica, sans-serif" font-size="58" font-weight="800">to spend today.</text>
  <text x="130" y="372" fill="#58708c" font-family="Arial, Helvetica, sans-serif" font-size="30">Static calculator now. Mature budgeting app planned.</text>

  <rect x="128" y="422" width="210" height="60" rx="10" fill="#1f6fd2"/>
  <text x="233" y="462" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" text-anchor="middle">Free calculator</text>
  <rect x="358" y="422" width="196" height="60" rx="10" fill="#fff9ec" stroke="#f6b84b" stroke-width="2"/>
  <text x="456" y="462" fill="#221600" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" text-anchor="middle">Local-first</text>

  <rect x="612" y="126" width="240" height="326" rx="24" fill="#0d1b2e" stroke="#24405e" stroke-width="2"/>
  <rect x="638" y="162" width="188" height="250" rx="18" fill="#132a45"/>
  <text x="666" y="210" fill="#dbe9f8" font-family="Arial, Helvetica, sans-serif" font-size="21">Safe to spend</text>
  <text x="666" y="282" fill="#37d67a" font-family="Arial, Helvetica, sans-serif" font-size="56" font-weight="800">$237</text>
  <rect x="666" y="324" width="130" height="12" rx="6" fill="#24405e"/>
  <rect x="666" y="324" width="88" height="12" rx="6" fill="#37d67a"/>
  <text x="666" y="382" fill="#dbe9f8" font-family="Arial, Helvetica, sans-serif" font-size="22">before payday</text>

