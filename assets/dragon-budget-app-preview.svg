    <text x="32" y="52" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Cash Flow</text>
    <rect x="28" y="78" width="342" height="44" rx="14" fill="#132a45" stroke="#24405e"/>
    <text x="74" y="107" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="16">Week</text>
    <rect x="148" y="84" width="102" height="32" rx="12" fill="#1f6fd2"/>
    <text x="174" y="107" fill="#ffffff" font-family="Arial, Helvetica, sans-serif" font-size="16">Month</text>
    <text x="286" y="107" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="16">Custom</text>
    <rect x="28" y="146" width="342" height="294" rx="18" fill="url(#card)" stroke="#24405e"/>
    <text x="52" y="184" fill="#bdd0e5" font-family="Arial, Helvetica, sans-serif" font-size="17">Starting balance</text>
    <text x="242" y="184" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="17">$1,250.00</text>
    <line x1="68" x2="68" y1="206" y2="404" stroke="#24405e" stroke-width="3"/>
    <circle cx="68" cy="232" r="8" fill="#37d67a"/>
    <text x="94" y="238" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="20">Paycheck</text>
    <text x="258" y="238" fill="#37d67a" font-family="Arial, Helvetica, sans-serif" font-size="18">Income $2,100</text>
    <circle cx="68" cy="284" r="8" fill="#f6b84b"/>
    <text x="94" y="290" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="20">Rent</text>
    <text x="254" y="290" fill="#f6b84b" font-family="Arial, Helvetica, sans-serif" font-size="18">Outflow $1,200</text>
    <circle cx="68" cy="336" r="8" fill="#f6b84b"/>
    <text x="94" y="342" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="20">Insurance</text>
    <text x="260" y="342" fill="#f6b84b" font-family="Arial, Helvetica, sans-serif" font-size="18">Outflow $145</text>
    <circle cx="68" cy="388" r="8" fill="#f6b84b"/>
    <text x="94" y="394" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="20">Trip plan</text>
    <text x="260" y="394" fill="#f6b84b" font-family="Arial, Helvetica, sans-serif" font-size="18">Outflow $200</text>
    <rect x="28" y="464" width="342" height="60" rx="16" fill="#132a45" stroke="#24405e"/>
    <text x="52" y="502" fill="#bdd0e5" font-family="Arial, Helvetica, sans-serif" font-size="18">Projected end balance</text>
    <text x="256" y="502" fill="#2f8cff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">$3,384.51</text>
  </g>

  <g transform="translate(1034 150)" filter="url(#shadow)">
    <rect width="398" height="560" rx="34" fill="url(#screen)" stroke="#8ca6c7" stroke-width="2"/>
    <text x="32" y="52" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Event Details</text>
    <rect x="28" y="82" width="342" height="126" rx="20" fill="url(#card)" stroke="#24405e"/>
    <circle cx="88" cy="145" r="36" fill="url(#blue)"/>
    <text x="140" y="134" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="800">Weekend Trip</text>
    <text x="140" y="166" fill="#bdd0e5" font-family="Arial, Helvetica, sans-serif" font-size="17">May 30 - Jun 1</text>
    <text x="272" y="134" fill="#bdd0e5" font-family="Arial, Helvetica, sans-serif" font-size="17">Budget</text>
    <text x="272" y="168" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800">$800</text>
    <rect x="28" y="232" width="342" height="126" rx="20" fill="url(#card)" stroke="#24405e"/>
    <text x="70" y="284" fill="#2f8cff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">$480 spent</text>
    <text x="218" y="284" fill="#37d67a" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800">$320 left</text>
    <path d="M170 320a48 48 0 1 1 58 0" fill="none" stroke="#2f8cff" stroke-width="14" stroke-linecap="round"/>
    <text x="199" y="316" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="800" text-anchor="middle">60%</text>
    <rect x="28" y="382" width="342" height="112" rx="20" fill="url(#card)" stroke="#24405e"/>
    <text x="58" y="426" fill="#f5f8ff" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="800">Can I afford this?</text>
    <text x="58" y="462" fill="#37d67a" font-family="Arial, Helvetica, sans-serif" font-size="19">Yes, this fits the current plan.</text>
  </g>
</svg>
